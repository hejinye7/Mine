<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>3D扫雷 · 工程控制台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI','Microsoft YaHei',sans-serif;display:flex;height:100vh}
.sidebar{width:280px;background:#161b22;border-right:1px solid #21262d;padding:20px;display:flex;flex-direction:column}
.sidebar h2{color:#e94560;font-size:16px;margin-bottom:16px}
.sidebar .link{display:block;padding:10px 14px;margin:4px 0;border-radius:6px;color:#aaa;text-decoration:none;font-size:14px;transition:all 0.2s}
.sidebar .link:hover{background:#1a1a2e;color:#fff}
.sidebar .link.active{background:#1a1a2e;border:1px solid #e94560;color:#e94560}
.main{flex:1;display:flex;flex-direction:column}
.header{padding:16px 24px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;color:#e94560}
.header .status{font-size:12px;color:#888}
.header .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-green{background:#5f5;box-shadow:0 0 4px #5f5}
#chat-area{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:8px;font-size:14px;line-height:1.6;animation: fadeIn 0.2s}
.msg.user{background:#1a3a2a;border:1px solid #2a5a3a;align-self:flex-end;color:#8f8}
.msg.ai{background:#1a1a3a;border:1px solid #2a2a5a;align-self:flex-start;color:#8cf}
.msg.system{background:#1a1a1a;border:1px solid #333;align-self:center;color:#888;font-size:12px}
.msg .time{font-size:10px;color:#555;margin-top:4px}
.msg .step-tag{display:inline-block;padding:0 6px;border-radius:3px;background:rgba(233,69,96,0.15);color:#e94560;font-size:11px;margin-right:6px}
.input-area{display:flex;gap:10px;padding:16px 24px;border-top:1px solid #21262d;background:#161b22}
.input-area input{flex:1;padding:10px 14px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:14px;outline:none}
.input-area input:focus{border-color:#e94560}
.input-area button{padding:10px 20px;background:#e94560;border:none;border-radius:6px;color:#fff;font-size:14px;cursor:pointer;transition:background 0.2s}
.input-area button:hover{background:#ff6b81}
#steps-panel{display:none;overflow-y:auto;padding:16px 24px}
#steps-panel.show{display:block}
.step-entry{padding:8px 12px;margin:4px 0;background:#161b22;border-left:3px solid #e94560;border-radius:0 4px 4px 0;font-size:13px;color:#aaa}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="sidebar">
  <h2>⚔ 3D扫雷</h2>
  <a href="/game.html" class="link" target="_blank">🎮 打开游戏</a>
  <a href="/" class="link active">💬 工程控制台</a>
  <div style="flex:1"></div>
  <div style="font-size:11px;color:#555;padding:8px">
    服务器: localhost:3000<br>
    每 2 秒自动刷新
  </div>
</div>

<div class="main">
  <div class="header">
    <h1>💬 工程控制台</h1>
    <span class="status"><span class="dot dot-green"></span> Claude 在线</span>
    <div style="flex:1"></div>
    <button onclick="toggleSteps()" style="background:none;border:1px solid #333;color:#888;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px">📋 步骤</button>
  </div>

  <div id="chat-area"></div>

  <div id="steps-panel">
    <h3 style="color:#888;font-size:13px;margin-bottom:8px">工程步骤日志</h3>
    <div id="steps-list"></div>
  </div>

  <div class="input-area">
    <input id="msg-input" placeholder="输入需求、反馈或问题..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
const chatArea = document.getElementById('chat-area');
const msgInput = document.getElementById('msg-input');
let lastResponseCount = 0;

function addMessage(text, type, time) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  const t = time ? new Date(time).toLocaleTimeString() : new Date().toLocaleTimeString();
  div.innerHTML = text + `<div class="time">${t}</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMsg() {
  const text = msgInput.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  msgInput.value = '';
  await fetch('/api/feedback', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text })
  });
}

async function pollResponses() {
  try {
    const res = await fetch('/api/response');
    const data = await res.json();
    if (data.length > lastResponseCount) {
      for (let i = lastResponseCount; i < data.length; i++) {
        addMessage(data[i].text, 'ai', data[i].time);
      }
      lastResponseCount = data.length;
    }
  } catch {}
}

async function pollSteps() {
  try {
    const res = await fetch('/api/steps');
    const data = await res.json();
    const list = document.getElementById('steps-list');
    list.innerHTML = '';
    data.forEach(s => {
      const div = document.createElement('div');
      div.className = 'step-entry';
      div.textContent = `[${new Date(s.time).toLocaleTimeString()}] ${s.text}`;
      list.appendChild(div);
    });
  } catch {}
}

function toggleSteps() {
  const panel = document.getElementById('steps-panel');
  const chat = document.getElementById('chat-area');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) { chat.style.display = 'none'; pollSteps(); }
  else { chat.style.display = 'flex'; }
}

setInterval(pollResponses, 2000);
pollResponses();

// Welcome message
addMessage('🤖 Claude 已就绪，等待你的指令。', 'system');
addMessage('你可以：\n• 🎮 打开游戏测试\n• 💬 在下方输入需求/反馈\n• 📋 点击右上角查看步骤日志', 'ai', Date.now());
</script>
</body>
</html>
